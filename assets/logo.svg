<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Circular refresh arrows -->
  <g transform="translate(60, 60)">
    <!-- Outer ring - refresh cycle -->
    <path d="M 0 -38 A 38 38 0 1 1 -33 19" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <polygon points="-38,14 -28,22 -33,10" fill="url(#arrow)"/>
    <path d="M 0 38 A 38 38 0 1 1 33 -19" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <polygon points="38,-14 28,-22 33,-10" fill="url(#arrow)"/>

    <!-- Leaf in center -->
    <path d="M 0 -20 C 14 -18 20 -6 20 8 C 20 18 10 24 0 24 C -10 24 -20 18 -20 8 C -20 -6 -14 -18 0 -20 Z" fill="url(#leaf)" opacity="0.9"/>
    <path d="M 0 -14 C 0 -14 -2 0 0 10 M 0 -4 C -6 2 -10 4 -12 4 M 0 2 C 6 6 10 10 12 10" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.8"/>

    <!-- Small shield accent -->
    <g transform="translate(24, -28) scale(0.5)">
      <path d="M 0 -16 L 14 -8 L 14 6 C 14 14 0 22 0 22 C 0 22 -14 14 -14 6 L -14 -8 Z" fill="url(#shield)" opacity="0.85"/>
      <polyline points="-5,2 -1,7 7,-4" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- Text -->
  <text x="118" y="72" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="#1e293b">dep</tspan><tspan fill="url(#leaf)">fresh</tspan>
  </text>

  <!-- Tagline -->
  <text x="120" y="96" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5">
    Upgrade. Audit. Ship safe.
  </text>
</svg>
